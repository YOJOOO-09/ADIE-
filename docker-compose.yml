services:

  # ── Python Backend (FastAPI + pythonocc + Gemini) ───────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adie_backend
    ports:
      - "8000:8000"
    volumes:
      # Sync live data files with the host so Fusion 360 (on host) can write
      # violations.json and the container immediately serves the updated data.
      - ./data:/app/data
      - ./validation_scripts:/app/validation_scripts
      - ./standards:/app/standards
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ADIE_MODEL=${ADIE_MODEL:-gemini-2.0-flash}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/rules"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── React Dashboard (nginx static + /api proxy) ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: adie_frontend
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
