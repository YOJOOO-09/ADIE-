name: adie
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pythonocc-core          # OpenCASCADE bindings — conda ONLY, never pip
  - pip

  - pip:
    - pymupdf>=1.23.0        # PDF text extraction (fitz)
    - google-generativeai>=0.5.0  # Gemini 1.5 Flash SDK
    - python-dotenv>=1.0.0   # .env file support for GEMINI_API_KEY
    - pytest>=8.0.0          # unit tests
    - pytest-timeout>=2.2.0  # prevent test hangs
